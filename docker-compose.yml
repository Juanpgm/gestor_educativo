services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gestor_educativo
      POSTGRES_USER: gestor_user
      POSTGRES_PASSWORD: gestor_dev_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor_user -d gestor_educativo"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - secrets/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates
      - ./uploads:/app/uploads
      - ./generated:/app/generated
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
